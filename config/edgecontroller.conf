# EdgeController Setup Configuration
# -----------------------------------
# Fill in your WiFi credentials below, save the file, then plug the SD card
# back into the Pi and power it on. The device will connect and clear this
# file automatically for security.
#
# You can also leave this blank and use the setup hotspot instead:
#   SSID:     EdgeController-XXXX  (unique per device)
#   Password: edgesetup
#   Then open  http://10.42.0.1  in your browser.

[wifi]
ssid =
password =

[network]
# mode = dhcp  (or "static" for a fixed IP address)
mode = dhcp
# ip      = 192.168.1.100
# subnet  = 255.255.255.0
# gateway = 192.168.1.1
# dns     = 8.8.8.8
