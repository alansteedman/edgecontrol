<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<title>EdgeController Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#161616;border:1px solid #222;border-radius:14px;padding:28px 24px;width:100%;max-width:380px}
.header{text-align:center;margin-bottom:26px}
.logo-icon{font-size:32px;margin-bottom:8px}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px}
.device-id{display:inline-block;background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:4px 10px;font-family:monospace;font-size:13px;color:#4fc3f7;margin-top:8px}
.section{margin-bottom:20px}
.section-title{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.network-list{background:#111;border:1px solid #1e1e1e;border-radius:8px;overflow:hidden;max-height:220px;overflow-y:auto}
.network-item{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;border-bottom:1px solid #1a1a1a;transition:background .1s}
.network-item:last-child{border-bottom:none}
.network-item:hover{background:#1a1a1a}
.network-item.selected{background:#1a2a35;border-left:3px solid #4fc3f7}
.net-icon{font-size:16px;flex-shrink:0}
.net-name{flex:1;font-size:13px;font-weight:500}
.net-signal{font-size:11px;color:#555}
.net-lock{font-size:11px;color:#444;margin-left:4px}
.in-use-badge{font-size:9px;background:#1a3a2a;color:#4ade80;border-radius:4px;padding:2px 5px;margin-left:6px;font-weight:700}
.empty{padding:20px;text-align:center;color:#444;font-size:12px}
label{display:block;font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input{width:100%;background:#111;border:1px solid #2a2a2a;color:#e0e0e0;padding:10px 12px;border-radius:7px;font-size:14px;outline:none;transition:border-color .15s}
input:focus{border-color:#4fc3f7}
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.btn-primary{background:#4fc3f7;color:#000}
.btn-primary:hover:not(:disabled){background:#29b6f6}
.btn-primary:disabled{background:#1a3a50;color:#2a6a8a;cursor:not-allowed}
.btn-secondary{background:#1e1e1e;color:#aaa;border:1px solid #2a2a2a;margin-top:8px}
.btn-secondary:hover{background:#252525;color:#ccc}
.status{margin-top:14px;padding:10px 13px;border-radius:8px;font-size:12px;display:none}
.status.info{background:#1a2535;border:1px solid #1e3a5a;color:#7bbfea;display:block}
.status.success{background:#0d2d1a;border:1px solid #166534;color:#4ade80;display:block}
.status.error{background:#2d0d0d;border:1px solid #7f1d1d;color:#fca5a5;display:block}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.scan-row .btn{width:auto;padding:8px 14px;font-size:11px}
.ssid-input-row{margin-bottom:14px;display:none}
.divider{text-align:center;color:#333;font-size:11px;margin:12px 0;position:relative}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#1e1e1e}
.divider span{position:relative;background:#161616;padding:0 8px}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.step{width:6px;height:6px;border-radius:50%;background:#222}
.step.active{background:#4fc3f7}
.step.done{background:#4ade80}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo-icon">⚡</div>
    <h1>EdgeController Setup</h1>
    <div class="sub">WiFi Configuration</div>
    <div class="device-id" id="deviceId">loading...</div>
  </div>

  <div class="step-indicator">
    <div class="step active" id="step1"></div>
    <div class="step" id="step2"></div>
    <div class="step" id="step3"></div>
  </div>

  <div id="wifiSection" class="section">
    <div class="scan-row">
      <div class="section-title" style="margin:0;flex:1">Select Network</div>
      <button class="btn btn-secondary" onclick="scan()" id="scanBtn" style="width:auto;padding:6px 12px;font-size:11px;margin:0">⟳ Scan</button>
    </div>
    <div class="network-list" id="networkList">
      <div class="empty" id="emptyMsg">Scanning for networks...</div>
    </div>
  </div>

  <div class="ssid-input-row" id="manualSsidRow">
    <label>Network Name (SSID)</label>
    <input type="text" id="manualSsid" placeholder="Enter network name"/>
  </div>

  <div class="divider"><span>or</span></div>
  <button class="btn btn-secondary" onclick="toggleManual()" id="manualBtn" style="margin-bottom:16px">Enter network name manually</button>

  <div class="section" id="passSection">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="WiFi password" onkeydown="if(event.key==='Enter')connect()"/>
  </div>

  <button class="btn btn-primary" onclick="connect()" id="connectBtn" disabled>Connect to Network</button>
  <div class="status" id="status"></div>

  <div style="margin-top:20px;padding-top:16px;border-top:1px solid #1a1a1a;text-align:center">
    <div style="font-size:10px;color:#444;margin-bottom:4px">DEVICE IP ADDRESS</div>
    <div style="font-family:monospace;font-size:13px;color:#666">10.42.0.1</div>
  </div>
</div>

<script>
let selectedSsid = null
let manualMode = false

// Load device ID
let deviceBoxId = ''
fetch('/api/status').then(r=>r.json()).then(d=>{
  deviceBoxId = d.boxId || ''
  document.getElementById('deviceId').textContent = deviceBoxId || 'unknown'
}).catch(()=>{})

// Auto-scan on load
scan()

function scan() {
  const btn = document.getElementById('scanBtn')
  btn.disabled = true
  btn.textContent = '⟳ Scanning...'
  document.getElementById('emptyMsg').style.display = 'block'
  document.getElementById('emptyMsg').textContent = 'Scanning...'
  // Clear existing items except empty msg
  const list = document.getElementById('networkList')
  Array.from(list.querySelectorAll('.network-item')).forEach(el => el.remove())

  fetch('/api/wifi/scan', {method:'POST'})
    .then(r => r.json())
    .then(networks => {
      btn.disabled = false
      btn.textContent = '⟳ Scan'
      const list = document.getElementById('networkList')
      const empty = document.getElementById('emptyMsg')
      Array.from(list.querySelectorAll('.network-item')).forEach(el => el.remove())
      if (!networks || !networks.length) {
        empty.textContent = 'No networks found — try scanning again'
        empty.style.display = 'block'
        return
      }
      empty.style.display = 'none'
      networks.forEach(n => {
        const el = document.createElement('div')
        el.className = 'network-item' + (n.inUse ? ' selected' : '')
        el.innerHTML = `
          <span class="net-icon">${signalIcon(n.signal)}</span>
          <span class="net-name">${esc(n.ssid)}${n.inUse ? '<span class="in-use-badge">CURRENT</span>' : ''}</span>
          <span class="net-signal">${n.signal}%</span>
          <span class="net-lock">${n.security !== 'Open' ? '🔒' : ''}</span>
        `
        el.onclick = () => selectNetwork(n.ssid, el)
        list.appendChild(el)
      })
    })
    .catch(e => {
      btn.disabled = false
      btn.textContent = '⟳ Scan'
      document.getElementById('emptyMsg').textContent = 'Scan failed — tap to retry'
      document.getElementById('emptyMsg').style.display = 'block'
    })
}

function signalIcon(s) {
  if (s >= 80) return '▂▄▆█'
  if (s >= 60) return '▂▄▆_'
  if (s >= 40) return '▂▄__'
  return '▂___'
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function selectNetwork(ssid, el) {
  selectedSsid = ssid
  Array.from(document.querySelectorAll('.network-item')).forEach(e => e.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('connectBtn').disabled = false
  document.getElementById('password').focus()
  setStep(2)
}

function toggleManual() {
  manualMode = !manualMode
  const row = document.getElementById('manualSsidRow')
  const btn = document.getElementById('manualBtn')
  if (manualMode) {
    row.style.display = 'block'
    btn.textContent = '← Select from list'
    document.getElementById('connectBtn').disabled = false
    document.getElementById('manualSsid').focus()
    setStep(2)
  } else {
    row.style.display = 'none'
    btn.textContent = 'Enter network name manually'
    if (!selectedSsid) document.getElementById('connectBtn').disabled = true
  }
}

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step'+i)
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '')
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status')
  el.textContent = msg
  el.className = 'status ' + type
}

async function connect() {
  const ssid = manualMode
    ? document.getElementById('manualSsid').value.trim()
    : selectedSsid
  const password = document.getElementById('password').value

  if (!ssid) { setStatus('Please select or enter a network name', 'error'); return }

  const btn = document.getElementById('connectBtn')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>Connecting...'
  setStep(3)

  const devId = deviceBoxId || (document.getElementById('deviceId')?.textContent || 'xxxx').trim()
  const mdnsUrl = 'http://' + devId.toLowerCase() + '.local:3000'
  const cfUrl = 'https://' + devId.toLowerCase() + '.kinkcontrol.org'

  // Show URLs immediately — Pi will reboot before fetch returns
  const statusEl = document.getElementById('status')
  statusEl.className = 'status info'
  statusEl.innerHTML =
    'Connecting to <strong>' + ssid + '</strong>...<br><br>' +
    'The device will reboot shortly. Rejoin your WiFi then open:<br><br>' +
    '<a href="' + mdnsUrl + '" style="color:#4fc3f7;font-size:15px;font-family:monospace;font-weight:700">' + mdnsUrl + '</a><br>' +
    '<span style="font-size:11px;color:#666">or remotely: <a href="' + cfUrl + '" style="color:#4fc3f7">' + cfUrl + '</a></span>'

  try {
    const r = await fetch('/api/wifi/connect', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ssid, password})
    })
    const data = await r.json()
    if (!r.ok || data.error) throw new Error(data.error || 'Connection failed')

    btn.innerHTML = '✓ Rebooting...'
    btn.style.background = '#166534'
    btn.style.color = '#fff'
    statusEl.className = 'status success'
    statusEl.innerHTML =
      '✓ Connected! Rebooting now — rejoin your WiFi then open:<br><br>' +
      '<a href="' + mdnsUrl + '" style="color:#4fc3f7;font-size:15px;font-family:monospace;font-weight:700">' + mdnsUrl + '</a><br>' +
      '<span style="font-size:11px;color:#666">or remotely: <a href="' + cfUrl + '" style="color:#4fc3f7">' + cfUrl + '</a></span>'
  } catch(e) {
    // Network drop likely means Pi rebooted — treat as success
    if (!e.message || e.message.toLowerCase().includes('fetch') || e.message.toLowerCase().includes('network') || e.message.toLowerCase().includes('failed')) {
      btn.innerHTML = '✓ Rebooting...'
      btn.style.background = '#166534'
      btn.style.color = '#fff'
      statusEl.className = 'status success'
      statusEl.innerHTML =
        '✓ Rebooting! Rejoin your WiFi then open:<br><br>' +
        '<a href="' + mdnsUrl + '" style="color:#4fc3f7;font-size:15px;font-family:monospace;font-weight:700">' + mdnsUrl + '</a><br>' +
        '<span style="font-size:11px;color:#666">or remotely: <a href="' + cfUrl + '" style="color:#4fc3f7">' + cfUrl + '</a></span>'
    } else {
      statusEl.className = 'status error'
      statusEl.textContent = 'Failed: ' + e.message
      btn.disabled = false
      btn.textContent = 'Connect to Network'
      setStep(2)
    }
  }
}
</script>
</body>
</html>
